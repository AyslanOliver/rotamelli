<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão de Usuários</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Gestão de Usuários</h1>
      <div class="config">
        <button id="btnLogout" style="display:none">Sair</button>
      </div>
    </header>
    <main>
      <section id="login" class="form">
        <h2>Login</h2>
        <div class="grid">
          <label>E-mail <input id="loginEmail" type="email"></label>
          <label>Senha <input id="loginPin" type="password"></label>
        </div>
        <button id="btnLogin">Entrar</button>
        <p id="loginMsg" class="msg"></p>
      </section>
      <div id="adminPanel" style="display:none">
      <section class="form">
        <h2>Novo usuário</h2>
        <div class="grid">
          <label>Nome <input id="name" type="text"></label>
          <label>E-mail <input id="email" type="email"></label>
          <label>Perfil
            <select id="role">
              <option value="user">Usuário</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label>PIN (opcional) <input id="pin" type="password"></label>
          <label>Ativo
            <select id="active">
              <option value="1">Sim</option>
              <option value="0">Não</option>
            </select>
          </label>
        </div>
        <button id="btnAdd">Adicionar</button>
        <p id="msg" class="msg"></p>
      </section>
      <section>
        <h2>Usuários</h2>
        <table id="tbl">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Perfil</th>
              <th>Ativo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
  </html>
